services:
  postgres:
    image: postgres:16
    container_name: focus20-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: focus20
    ports:
      - "5432:5432"
    volumes:
      - focus20_pgdata:/var/lib/postgresql/data

volumes:
  focus20_pgdata: